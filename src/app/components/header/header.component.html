<div class="navbar flex-centered dark-theme" [style.height]="height">
  <div class="nav-container">
    <a routerLink="./" id="aorika-logo-anchor">
      <img
        class="aorika-logo"
        [style.height]="logoHeight"
        [src]="'aorika-logo-89ccc5.svg' | asset"
        loading="lazy"
        width="99"
        alt=""
      />
    </a>
    <nav role="navigation" class="nav-menu flex-centered">
      <a
        routerLink="/catalog"
        [class.selected]="isSelected('catalog')"
        class="nav-link"
        alt="Link to Catalog page"
        title="קטלוג המוצרים"
        aria-label="קטלוג המוצרים"
        aria-describedby="קישור לקטלוג המוצרים של אאוריקה"
        >הקטלוג</a
      ><a
        href="/gallery"
        [class.selected]="isSelected('gallery')"
        class="nav-link"
        alt="Link to Gallery page"
        title="גלרית התמונות"
        aria-label="גלרית התמונות"
        aria-describedby="קישור לגלרית התמונות של אאוריקה"
        >גלריה</a
      >
      <a
        href="/groups"
        [class.selected]="isSelected('groups')"
        class="nav-link"
        alt="Link to Gallery page"
        title="קטלוג הסדנאות הקבוצתיות"
        aria-label="קטלוג הסדנאות הקבוצתיות"
        aria-describedby="קישור לקטלוג הסדנאות הקבוצתיות של אאוריקה"
        ><span *ngIf="!isMobile()">סדנאות ל</span>קבוצות</a
      >
      <a
        [href]="contactCardDownload.vcfHref"
        [attr.download]="contactCardDownload.vcfDownloadFilename"
        class="nav-link nav-link-contact-download"
        title="הורדת כרטיס איש קשר — אור אבקסיס, אאוריקה"
        aria-label="הורדת איש קשר לאור אבקסיס מאאוריקה"
        (click)="contactCardDownload.onVcfAnchorClick()"
      >
        <svg
          class="contact-nav-icon"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 16 16"
          fill="currentColor"
          aria-hidden="true"
          focusable="false"
        >
          <path
            d="m 8 1 c -1.65625 0 -3 1.34375 -3 3 s 1.34375 3 3 3 s 3 -1.34375 3 -3 s -1.34375 -3 -3 -3 z m -1.5 7 c -2.492188 0 -4.5 2.007812 -4.5 4.5 v 0.5 c 0 1.109375 0.890625 2 2 2 h 6 v -1 h -3 v -4 h 3 v -1.972656 c -0.164062 -0.019532 -0.332031 -0.027344 -0.5 -0.027344 z m 4.5 0 v 3 h -3 v 2 h 3 v 3 h 2 v -3 h 3 v -2 h -3 v -3 z"
          />
        </svg>
      </a>
    </nav>
  </div>
</div>
